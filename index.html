<!DOCTYPE html>
<html lang="lv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teikas Ezīša Karaoke</title>
<style>
body {
    font-family: Arial, sans-serif;
    margin:0;
    background:#121212;
    color:white;
}
.login {
    height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
}
.card {
    background:#1e1e1e;
    padding:30px;
    border-radius:16px;
    width:320px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}
input {
    width:100%;
    padding:12px;
    margin:8px 0;
    border-radius:8px;
    border:none;
    box-sizing:border-box;
}

button {
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#ff9800;
    cursor:pointer;
    font-weight:bold;
}
#app {
    display:none;
    max-width:1200px;
    margin:auto;
    padding:20px;
}
#search {
    font-size:22px;
    padding:16px;
}
.song {
    padding:8px 12px;
    border-bottom:1px solid #333;
}
.counter {
    margin:15px 0;
    color:#ccc;
}
</style>
</head>
<body>

<div id="loginPage" class="login">
  <div class="card">
    <h2>Autorizācija</h2>
    <input id="user" placeholder="Lietotājvārds">
    <input id="pass" type="password" placeholder="Parole">
    <button onclick="login()">Ieiet</button>
    <p id="msg"></p>
  </div>
</div>

<div id="app">
    <h1>🎤 Teikas Ezīša Karaoke</h1>
    <input id="search" placeholder="Meklēt dziesmu..." oninput="filterSongs()">
    <div class="counter" id="counter"></div>
    <div id="songs"></div>
</div>

<script>
const USERNAME = "karaoke";
const PASSWORD = "migla"; // ---------------------------------------------------vari mainīt šeit

    //-------------lashishana no csv faila
let songs = [];

async function loadSongs() {
    const response = await fetch("songs.csv?v=" + Date.now());
    const text = await response.text();

    songs = text
        .split(/\r?\n/)
        .map(line => line.trim())
        .filter(line => line.length > 0);
}
    
function login() {
    if (
        document.getElementById('user').value === USERNAME &&
        document.getElementById('pass').value === PASSWORD
    ) {
        document.getElementById('loginPage').style.display='none';
        document.getElementById('app').style.display='block';
        //----------te notiek visa fiich
        loadSongs().then(() => {
            renderSongs(songs);
        });
        
    } else {
        document.getElementById('msg').textContent = 'Tu nemāki rakstīt :(';
        //document.getElementById('msg').textContent = 'Nepareizs lietotājvārds vai parole!';
    }
}

function renderSongs(list) {
    const container = document.getElementById('songs');
    container.innerHTML = list.map(s => `<div class="song">${s}</div>`).join('');
    document.getElementById('counter').textContent =
        "Atrastas " + list.length + " dziesmas";
}

function filterSongs() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = songs.filter(s => s.toLowerCase().includes(q));
    renderSongs(filtered);
}
</script>

</body>
</html>
